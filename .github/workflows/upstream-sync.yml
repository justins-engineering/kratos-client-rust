name: Upstream sync

# The task #23 payoff: turn "upstream regenerated src/apis, now go hand-port
# wasm_apis/worker_apis" into a scheduled, mostly-automated PR instead of a
# manual chore. See tools/regen-fetch-apis/src/main.rs and the task #23
# design doc for the full architecture this assumes: src/apis (the
# openapi-generator-tech reqwest tree) is upstream's content, synced in
# wholesale and never hand-edited; wasm_apis/worker_apis are regenerated
# from it by the codemod, not hand-ported.

on:
  schedule:
    # Daily. Upstream (ory/kratos-client-rust) regenerates on Kratos
    # releases, which aren't frequent enough to need anything tighter, and
    # this is a no-op most days (see the "nothing to sync" exit below).
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always
  UPSTREAM_REPO: https://github.com/ory/kratos-client-rust.git
  # Pin every `gh` command to THIS fork. The "Add upstream remote" step adds a
  # second git remote pointing at ory/kratos-client-rust, and gh's base-repo
  # auto-detection resolves that parent instead of origin -- so label/pr/issue
  # calls hit ory's repo and 403 ("Resource not accessible by integration").
  # GH_REPO overrides that detection globally for the whole job.
  GH_REPO: ${{ github.repository }}

jobs:
  sync:
    name: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Add upstream remote
        run: |
          git remote add upstream "$UPSTREAM_REPO"
          git fetch upstream master

      # Change detection compares OUR CURRENT src/apis CONTENT against upstream
      # directly -- NOT via merge-base. This fork *mirrors* upstream's src/apis
      # (+ src/models/docs/.openapi-generator) through a targeted path checkout
      # (see the "Pull upstream" step); it never `git merge`s upstream's commits,
      # so merge-base(HEAD, upstream/master) is frozen at the last real merge and
      # never advances as we sync. A merge-base-based diff therefore reports
      # "src/apis changed" FOREVER -- re-syncing already-synced content every day,
      # re-clobbering the src/models node_type fix (upstream #3 workaround), and
      # opening a duplicate PR each run (this is what let the 2026-07-23 dup PR
      # spawn). Diffing our working tree's src/apis straight against
      # upstream/master is the correct signal for a content-mirroring fork: empty
      # == already in sync, regardless of how many upstream commits sit between
      # the frozen merge-base and upstream's tip. src/apis is the authoritative
      # trigger (the only tree the codemod reads); upstream's repo-template/chore
      # commits that don't touch it are correctly ignored. base/upstream_head are
      # still emitted purely for the commit-message / PR-body provenance text
      # below -- they are no longer the trigger.
      - name: Check whether upstream's src/apis differs from ours
        id: check
        run: |
          base=$(git merge-base HEAD upstream/master)
          upstream_head=$(git rev-parse upstream/master)
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "upstream_head=$upstream_head" >> "$GITHUB_OUTPUT"

          if git diff --quiet HEAD upstream/master -- src/apis; then
            echo "our src/apis already matches upstream/master -- nothing to sync"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "src/apis differs from upstream/master -- sync needed"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # The "Commit regenerated trees and open a PR" step below already guards
      # against re-creating a PR for the SAME date branch on a same-day
      # re-run. That's not enough across a date rollover: this job runs once
      # a day, branches are date-named (upstream-sync/YYYY-MM-DD), and an
      # unmerged sync PR left open overnight still has content differing
      # from upstream (the content-diff check above only goes quiet once a
      # PR MERGES) -- so tomorrow's run sees has_changes=true again and, with
      # nothing else stopping it, opens a second PR for the same
      # upstream_head under tomorrow's date branch. This is exactly what
      # produced PRs #14/#15. Guard on the upstream_head embedded in every
      # sync PR's title ("Upstream sync: <sha>", set below) across ALL open
      # upstream-sync-labeled PRs, not just today's branch name.
      - name: Check for an already-open sync PR for this upstream head
        id: dup_check
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          upstream_head="${{ steps.check.outputs.upstream_head }}"
          existing=$(gh pr list --label upstream-sync --state open \
            --json number,title \
            --jq ".[] | select(.title | contains(\"$upstream_head\")) | .number" | head -1)
          if [ -n "$existing" ]; then
            echo "PR #$existing is already open for upstream head $upstream_head (on a prior day's date-branch) -- skipping, nothing new to sync"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure the upstream-sync label exists
        if: steps.check.outputs.has_changes == 'true' && steps.dup_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The PR + codemod-failure-issue steps below both tag with this label;
          # --force makes it idempotent (create, or update if it already exists).
          gh label create upstream-sync \
            --color BFD4F2 \
            --description "Automated upstream ory/kratos-client-rust sync PRs and issues" \
            --force

      - name: Pull upstream's src/apis, src/models, docs, .openapi-generator
        if: steps.check.outputs.has_changes == 'true' && steps.dup_check.outputs.skip != 'true'
        run: |
          git checkout upstream/master -- src/apis src/models docs .openapi-generator
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="upstream-sync/$(date -u +%Y-%m-%d)"
          echo "branch=$branch" >> "$GITHUB_ENV"
          git checkout -b "$branch"
          git add src/apis src/models docs .openapi-generator
          git commit -m "$(cat <<EOF
          sync: pull upstream src/apis changes (${{ steps.check.outputs.upstream_head }})

          Pulled src/apis, src/models, docs, and .openapi-generator from
          upstream ory/kratos-client-rust@${{ steps.check.outputs.upstream_head }}
          via a targeted path checkout (not a full merge -- this fork has
          diverged on Cargo.toml/CHANGELOG.md/wasm_apis/worker_apis/tools
          in ways a full merge would conflict on for no reason, since only
          these directories are genuinely upstream's content; see the
          task #23 design doc).

          Next commits (if this workflow gets that far): re-apply the
          UiNodeAttributes untagged fix (upstream #3) that this pull just
          re-clobbered, then regenerate wasm_apis/worker_apis via
          tools/regen-fetch-apis.
          EOF
          )"

      # The pull above overwrites src/models wholesale from upstream, which
      # re-clobbers this fork's standing fix for upstream #3 (see PR #14 /
      # CHANGELOG 0.2.5) every time upstream regenerates it -- confirmed
      # still present at upstream/master as of this workflow version, i.e.
      # this isn't hypothetical, it fires on every sync until upstream fixes
      # #3 for good. patches/ui-node-attributes-untagged.patch is a plain
      # `diff -u` from upstream's tagged shape to this fork's untagged fix
      # (regenerate it the same way if this ever needs updating -- see the
      # patch's own header). `git apply` only lands cleanly if the file's
      # surrounding context still matches; if upstream has changed this
      # enum's shape enough that it doesn't, this step fails loudly instead
      # of silently leaving the tagged (broken) version in place. The grep
      # afterward is a second, independent check of the same fact, in case
      # the patch ever applied "successfully" against a shape where that
      # doesn't mean what we think it means.
      #
      # Placed before regen/build so every step downstream of here -- the
      # compile check, the PR diff, CI on the PR -- reflects the final,
      # correct tree, not the momentarily-clobbered one.
      - name: Re-apply UiNodeAttributes untagged fix (upstream #3)
        if: steps.check.outputs.has_changes == 'true' && steps.dup_check.outputs.skip != 'true'
        run: |
          f=src/models/ui_node_attributes.rs

          if ! git apply --verbose patches/ui-node-attributes-untagged.patch; then
            echo "::error::patches/ui-node-attributes-untagged.patch did not apply -- upstream's $f has drifted further than a straight re-apply can handle. This needs a human to look at the new upstream shape and refresh the patch (see the patch file's own comments); NOT safe to auto-continue with the tagged (broken) version in place."
            exit 1
          fi

          if grep -qF '#[serde(tag = "node_type")]' "$f"; then
            echo "::error::$f still contains the broken tagged attribute after patch apply -- the patch applied to the wrong spot or upstream duplicated this shape elsewhere in the file. Refusing to continue."
            exit 1
          fi
          if ! grep -qF '#[serde(untagged)]' "$f"; then
            echo "::error::$f is missing #[serde(untagged)] after patch apply -- re-apply silently no-opped somehow. Refusing to continue."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$f"
          git commit -m "$(cat <<EOF
          fix(models): re-apply UiNodeAttributes untagged fix (upstream #3)

          The sync in the previous commit overwrote src/models wholesale from
          upstream, which re-clobbers this fork's standing workaround for
          https://github.com/ory/kratos-client-rust/issues/3 (upstream emits
          UiNodeAttributes with #[serde(tag = "node_type")], which fails to
          deserialize real Kratos responses -- see CHANGELOG 0.2.5 / PR #14
          for the full explanation). Re-applied via
          patches/ui-node-attributes-untagged.patch and verified via grep
          that the tagged form is gone and untagged is back, so this can't
          silently regress again.
          EOF
          )"

      - name: Regenerate wasm_apis/worker_apis
        if: steps.check.outputs.has_changes == 'true' && steps.dup_check.outputs.skip != 'true'
        id: regen
        run: |
          set +e
          for f in courier metadata identity frontend; do
            cargo run --manifest-path tools/regen-fetch-apis/Cargo.toml --target x86_64-unknown-linux-gnu -- \
              "src/apis/${f}_api.rs" "src/wasm_apis/${f}_api.rs" "src/worker_apis/${f}_api.rs" \
              > /tmp/regen-output.log 2>&1
            status=$?
            if [ $status -ne 0 ]; then
              echo "codemod failed on ${f}_api.rs"
              cat /tmp/regen-output.log
              {
                echo "panic_log<<EOF_PANIC"
                echo "Codemod failed while regenerating \`${f}_api.rs\`:"
                echo '```'
                cat /tmp/regen-output.log
                echo '```'
                echo "EOF_PANIC"
              } >> "$GITHUB_OUTPUT"
              echo "failed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          rustfmt --edition 2024 src/wasm_apis/*.rs src/worker_apis/*.rs
          echo "failed=false" >> "$GITHUB_OUTPUT"

      # The fail-loud case (task #23's whole point, and the exact scenario
      # #30 already anticipates: openapi-generator changing its p_-prefix
      # convention will trip the codemod's per-parameter "every param must
      # be accounted for" guard). Never silently do nothing, never open a
      # PR with half-regenerated or wrong code -- file an issue naming the
      # panic, and fail the job so it's visible in the Actions tab too.
      - name: File an issue if the codemod failed
        if: steps.check.outputs.has_changes == 'true' && steps.dup_check.outputs.skip != 'true' && steps.regen.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Upstream sync: regen-fetch-apis failed on upstream ${{ steps.check.outputs.upstream_head }}" \
            --label "upstream-sync" \
            --body "$(cat <<EOF
          Upstream ory/kratos-client-rust has new src/apis changes
          (up to \`${{ steps.check.outputs.upstream_head }}\`), but
          \`tools/regen-fetch-apis\` failed to regenerate \`wasm_apis\`/
          \`worker_apis\` from them -- this is the codemod's fail-loud
          guard catching a statement or parameter shape it doesn't
          recognize (see the panic below), most likely a real change on
          upstream's side (spec change, or an openapi-generator template
          convention change like the \`p_\` -> \`p_query_\`/\`p_header_\`
          prefix drift already tracked for the *next* real change -- see
          the CHANGELOG's 0.2.4 entry and the task #23/#24 history).

          The codemod needs a small update to handle whatever shape this
          is before this sync can proceed automatically. No PR was opened
          and no files were changed on \`master\` -- this issue and the
          failed workflow run are the only trace.

          ${{ steps.regen.outputs.panic_log }}

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )"
          exit 1

      - name: Build sanity check (wasm + worker + reqwest, compile only)
        if: steps.check.outputs.has_changes == 'true' && steps.dup_check.outputs.skip != 'true' && steps.regen.outputs.failed == 'false'
        run: |
          cargo build --target wasm32-unknown-unknown
          cargo build --target wasm32-unknown-unknown --no-default-features --features worker
          cargo build --no-default-features --features reqwest --target x86_64-unknown-linux-gnu

      # Full Kratos-backed test coverage (the reqwest integration suite +
      # wasm/worker smoke tests) deliberately isn't duplicated here -- once
      # this PR is opened, ci.yml's `pull_request:` trigger runs the whole
      # suite against it automatically. This job only needs to prove the
      # regenerated code compiles before asking for review.
      - name: Commit regenerated trees and open a PR
        if: steps.check.outputs.has_changes == 'true' && steps.dup_check.outputs.skip != 'true' && steps.regen.outputs.failed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add src/wasm_apis src/worker_apis
          git commit -m "$(cat <<EOF
          wasm_apis/worker_apis: regenerate from synced upstream src/apis

          Ran tools/regen-fetch-apis across all four API files against the
          src/apis pulled from upstream in the prior commit. Compiles clean
          for both the wasm and worker features (checked in this workflow
          run); the full reqwest-integration + smoke test suite runs
          automatically via ci.yml once this PR is opened.
          EOF
          )"
          # Branch name is date-based, so a same-day re-run reuses it: --force
          # overwrites the previous push (e.g. an orphaned branch from a run that
          # died before opening its PR), and the guard below reuses an already-open
          # PR (which the force-push has just updated) instead of erroring on a dup.
          #
          # Must check the PR's *state*, not just whether one exists for this head
          # ref: `gh pr view <branch>` matches any PR for that branch regardless of
          # state, including closed/merged ones from a previous day's PR that
          # happened to reuse this same date-branch name (e.g. re-opened manually,
          # then closed, then the branch recreated same-day) -- a plain existence
          # check would find that closed PR and skip `gh pr create` forever, even
          # though nothing is actually open to receive the force-pushed update.
          git push --force -u origin "$branch"
          if [ "$(gh pr view "$branch" --json state --jq .state 2>/dev/null)" = "OPEN" ]; then
            echo "PR already open for $branch; force-pushed the updated regen to it, nothing more to do"
          else
          gh pr create \
            --head "$branch" \
            --title "Upstream sync: ${{ steps.check.outputs.upstream_head }}" \
            --label "upstream-sync" \
            --body "$(cat <<EOF
          Automated sync from ory/kratos-client-rust@${{ steps.check.outputs.upstream_head }}
          (previous base: ${{ steps.check.outputs.base }}).

          - Pulled \`src/apis\`, \`src/models\`, \`docs\`, \`.openapi-generator\` from
            upstream's tip via targeted path checkout (not a full merge --
            see the first commit's message for why).
          - Regenerated \`wasm_apis\`/\`worker_apis\` via \`tools/regen-fetch-apis\`.
          - wasm + worker + reqwest features all compile clean (checked in
            this workflow run).
          - The full reqwest-integration + wasm/worker smoke test suite
            will run automatically against this PR via \`ci.yml\`.

          **Never auto-merged** -- this needs human review before landing,
          same as any change to a published crate. If the diff looks like
          more than the expected upstream-relabel + regenerated-Fetch-trees
          shape, something's off; compare against the task #23 commits
          (e1da07f / 22a01dc / 2594693) for what a clean regen diff looks
          like.
          EOF
          )"
          fi
